<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>벽돌깨기 게임</title>
    <link rel="stylesheet" href="brickBreaking.css"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="brickBreaking.js"></script>
    <!-- minecraft 기본 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css" />
</head>
<body>
    <div class="main">
        <img class="main_title" src="images/title.png">
        <section>
            <canvas id="gameCanvas" width="900" height="650"></canvas>
            <!-- 죽었습니다. -->
            <div class="dead">
                <div class="dead_alert">
                    <div>죽었습니다!</div>
                    <div>점수: 0</div>
                    <button>리스폰</button>
                    <button>타이틀 화면으로</button>
                </div>
            </div>
        </section>
        <button id="startButton">게임 시작</button>
    </div>
</body>
</html>
