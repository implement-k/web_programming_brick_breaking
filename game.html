<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>BrickCraft - Title</title>
    <link rel="stylesheet" href="game.css">
    <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
</head>

<body>
    <audio id="bgm" src="title_bgm.mp3" autoplay loop></audio>
    <audio id="btn-sound" src="btn.mp3"></audio>

    <!-- 시작 화면 -->
    <div id="title-screen">
        <button class="button" id="start-btn">START</button>
        <button class="button" id="setting-btn">SETTING</button>
        <button class="button" id="score-btn">SCORE</button>
    </div>

    <!-- 설정 화면 -->
    <div id="setting-scene" style="display: none;">
        <div class="setting-panel">
            <h2>설정</h2>
            <div class="setting-group">
                <label for="bgm-toggle">배경음악:</label>
                <button id="bgm-toggle">음악 끄기</button>
            </div>
            <div class="setting-group">
                <label>난이도:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <button class="button" id="back-btn">← 뒤로가기</button>
        </div>
    </div>

    <!-- 게임 생성 화면 -->
    <div id="create-scene" style="display: none;">
        <div class="create-panel">
            <h2>새 월드</h2>
            <div class="input-group">
                <label for="player-name">이름</label>
                <input type="text" id="player-name" placeholder="플레이어 이름 입력">
            </div>
            <button class="button" id="create-btn">Create New World</button>
            <button class="button" id="cancel-btn">Back</button>
        </div>
    </div>

    <!-- 스코어 화면 -->
    <div id="score-scene" style="display: none;">
        <div class="score-panel">
            <h2>스코어</h2>
            <ul id="score-list">
                <li>플레이어1 - 12000점</li>
                <li>플레이어2 - 9500점</li>
                <li>플레이어3 - 8500점</li>
                <!-- 여기에 점수 리스트 동적으로 추가 가능 -->
            </ul>
            <button class="button" id="score-back-btn">Back</button>
        </div>
    </div>

    <!-- 스토리 화면1 -->
    <div id="story-scene" style="display: none;">
        <div class="story-wrapper">
            <img id="story-image" src="" alt="Story Image">
            <div id="speech-box"></div>
            <button class="button" id="next-dialogue-btn">다음</button>
        </div>
    </div>

    <div id="main-game" style="display: none; width: 960px; height: 650px;">
        <canvas id="game-canvas" width="960" height="650"></canvas>

        <canvas id="mini-game-canvas" width="400" height="300" 
        style="display: none; position: absolute; top: 20px; left: 20px; border: 3px solid white;"></canvas>

        <button id="instant-win-btn" style="position: absolute; top: 20px; left: 20px; z-index: 9999; display: none;">
    즉시 승리</button>
    </div>

    <button id="test-mini-btn" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
        미니게임 시작
    </button>
    
    

    <script src="game.js"></script>
</body>

</html>
